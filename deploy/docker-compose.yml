# docker-socket-proxy: 컨트롤러가 raw docker.sock 대신 이 프록시(127.0.0.1:2375)만
# 통해 Docker를 호출하게 한다. 컨테이너 생성/시작/삭제 등 최소 API만 노출.
#
# 한계(정직하게): 이 프록시는 "어떤 API 엔드포인트"를 막을 뿐, create 호출의
# 파라미터(예: 위험한 bind mount)까지는 못 막는다. 진짜 1차 방어는 runner 격리이고,
# 이건 컨트롤러 침해 시 2차 방어다. 개인 박스 기준 수용 가능한 트레이드오프.
services:
  socket-proxy:
    # TODO(배포): 최초 pull 후 digest로 핀 고정 권장.
    image: tecnativa/docker-socket-proxy:latest
    container_name: surf-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1      # 컨테이너 조회/생성/삭제 경로
      IMAGES: 1          # docker run 시 이미지 inspect
      NETWORKS: 1        # --network surf-egress 참조
      POST: 1            # 쓰기(create/delete 포함) 허용
      ALLOW_START: 1     # 컨테이너 start
      ALLOW_STOP: 1      # 컨테이너 stop/kill
      # 그 외 SWARM/EXEC/VOLUMES/INFO 등은 기본값(차단) 유지
    ports:
      - "127.0.0.1:2375:2375"   # localhost에서만 접근 (외부 노출 금지)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
